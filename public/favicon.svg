<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8BF4D"/>
      <stop offset="50%" stop-color="#C5963A"/>
      <stop offset="100%" stop-color="#E8BF4D"/>
    </linearGradient>
    <linearGradient id="goldRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8BF4D"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Shield shape — pointed bottom -->
  <path d="M32 2 C16 2, 4 4, 4 8 L4 32 C4 46, 18 58, 32 62 C46 58, 60 46, 60 32 L60 8 C60 4, 48 2, 32 2Z" fill="url(#shield)" stroke="url(#goldRim)" stroke-width="2.5"/>

  <!-- Inner gold border -->
  <path d="M32 7 C19 7, 9 8.5, 9 11.5 L9 32 C9 43.5, 20.5 53.5, 32 57 C43.5 53.5, 55 43.5, 55 32 L55 11.5 C55 8.5, 45 7, 32 7Z" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>

  <!-- Horizontal gold divider -->
  <line x1="14" y1="30" x2="50" y2="30" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- "H" monogram -->
  <text x="32" y="40" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="30" fill="url(#gold)" letter-spacing="-1">H</text>

  <!-- Small decorative dots -->
  <circle cx="16" cy="18" r="1.5" fill="#E8BF4D" opacity="0.5"/>
  <circle cx="48" cy="18" r="1.5" fill="#E8BF4D" opacity="0.5"/>
</svg>
